
data:
  data_path: "ai_playground/data/datasets/text_datasets/shakespeare.txt"
  split: 0.9
  num_workers: 0

model:
  model_name: "bigram"
  model_kwargs: {}

trainer:
  auto_restart: true
  batch_size: 32
  max_epochs: 1
  max_steps: 500
  val_interval: 50
  lr: 0.01
  min_lr_ratio: 0.1
  betas: [0.9, 0.95]
  warmup_steps: 100
  weight_decay: 0.1
  grad_clip: 1.0
  precision: "fp16"
  use_fp16: false
  use_progress_bar: true
  logger: ["tensorboard"]
  log_dir: "runs/"
  log_interval: 10
  use_profiler: false
  profiler_wait: 1
  profiler_warmup: 1
  profiler_active: 3
  profiler_repeat: 2
  save_path: "checkpoints"
  save_interval: 0

experimental:
  seed: 42
  compile: false
  experiment_name: ""

distributed:
  device: "cpu"
  rank: 0
  world_size: 1
  distributed: "single"
